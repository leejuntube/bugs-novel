<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PROJECT LOOP LOG</title>

<style>
body {
    margin: 0;
    background: #05070d;
    color: #d0f7ff;
    font-family: 'Noto Sans KR', sans-serif;
}

/* 상단 시스템 바 */
.topbar {
    padding: 20px;
    border-bottom: 1px solid #1c2b33;
    letter-spacing: 2px;
    font-size: 14px;
    color: #7adfff;
}

/* 메인 컨테이너 */
.container {
    max-width: 900px;
    margin: auto;
    padding: 40px;
}

/* 프로젝트 타이틀 */
.title {
    font-size: 26px;
    margin-bottom: 10px;
    color: #ffffff;
}

.sub {
    font-size: 13px;
    color: #6a8a99;
    margin-bottom: 40px;
}

/* 카드 */
.card {
    border: 1px solid #1c2b33;
    padding: 20px;
    margin-bottom: 15px;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    border-color: #00eaff;
    background: rgba(0, 234, 255, 0.05);
    transform: translateX(5px);
}

/* 카드 제목 */
.card-title {
    font-size: 18px;
    margin-bottom: 5px;
    color: #ffffff;
}

/* 카드 설명 */
.card-desc {
    font-size: 13px;
    color: #8aa6b3;
}

/* 작은 시스템 텍스트 */
.system {
    font-size: 12px;
    color: #4d6b7a;
    margin-top: 40px;
}
</style>

</head>

<body>

<div class="topbar">
SYSTEM LOG / PROJECT: LOOP TRACE / STATUS: UNKNOWN
</div>

<div class="container">

<div class="title">반복 끝에서 나는</div>
<div class="sub">TIME ANOMALY DETECTED / 2012.06.18</div>

<!-- 회차 리스트 -->
<div class="card" onclick="location.href='ep1.html'">
    <div class="card-title">EP.01 — 첫 번째 아침</div>
    <div class="card-desc">기억되지 않는 하루의 시작</div>
</div>

<div class="card" onclick="location.href='ep2.html'">
    <div class="card-title">EP.02 — 같은 하루</div>
    <div class="card-desc">이미 본 장면이라는 감각</div>
</div>

<div class="card" onclick="location.href='ep3.html'">
    <div class="card-title">EP.03 — 같은 하루의 틈</div>
    <div class="card-desc">반복의 규칙이 드러나기 시작한다</div>
</div>

<div class="system">
> NOTE: RECORDS MAY NOT BE LINEAR<br>
> SUBJECT "LEE JUN" STATUS: UNSTABLE MEMORY LOOP
</div>

</div>

</body>
</html>
