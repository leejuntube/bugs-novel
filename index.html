<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>시작과 끝의 프롤로그</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #0a0f2c, #000);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* 별 효과 */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    animation: moveStars 60s linear infinite;
    opacity: 0.4;
}

@keyframes moveStars {
    from { transform: translate(0,0); }
    to { transform: translate(-500px, -500px); }
}

.container {
    text-align: center;
    z-index: 1;
}

.title {
    font-size: 48px;
    letter-spacing: 4px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px #00eaff;
}

.subtitle {
    font-size: 20px;
    color: #aaa;
    margin-bottom: 40px;
}

.button {
    padding: 15px 40px;
    font-size: 18px;
    color: white;
    border: 2px solid #00eaff;
    background: transparent;
    cursor: pointer;
    transition: 0.3s;
}

.button:hover {
    background: #00eaff;
    color: black;
    box-shadow: 0 0 20px #00eaff;
}

.footer {
    position: absolute;
    bottom: 20px;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<div class="container">
    <div class="title">시작과 끝의 프롤로그</div>
    <div class="subtitle">The Beginning and The End</div>

    <button class="button" onclick="startStory()">소설 시작</button>
</div>

<div class="footer">
© 2026 SF Novel Project
</div>

<script>
function startStory() {
    alert("곧 1화로 이동하게 만들 수 있음");
}
</script>

</body>
</html>
